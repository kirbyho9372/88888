<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄機 · 六爻占卜精準版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark: #0a0b06;
            --panel: #1a1a0b;
        }
        body {
            background-color: var(--dark);
            color: #f0e68c;
            font-family: 'Noto Serif TC', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: var(--panel);
            padding: 25px;
            border: 1px solid var(--gold);
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }
        h1 { color: var(--gold); text-align: center; font-size: 24px; margin-bottom: 25px; }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid var(--gold);
            box-sizing: border-box;
        }
        input { background: #2a2a1a; color: white; }
        button {
            background: var(--gold);
            color: var(--dark);
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #f0d060; }
        .result-area {
            margin-top: 20px;
            padding: 15px;
            background: #252515;
            border-left: 4px solid var(--gold);
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .coin-display { text-align: center; font-size: 40px; margin: 15px 0; }
        .history-table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            font-size: 14px;
        }
        .history-table th, .history-table td {
            border: 1px solid #444;
            padding: 8px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>玄機 · 六爻占卜</h1>
    
    <input type="text" id="question" placeholder="請輸入您想求問的事項（例如：這筆生意會成功嗎？）">
    
    <div class="coin-display" id="coinResult">🪙 🪙 🪙</div>
    
    <button onclick="tossCoins()">擲杯卜卦（共六次）</button>
    
    <div id="status">剩餘次數：6</div>
    
    <table class="history-table" id="history">
        <thead>
            <tr>
                <th>爻序</th>
                <th>結果</th>
                <th>陰陽</th>
            </tr>
        </thead>
        <tbody id="historyBody"></tbody>
    </table>

    <div class="result-area" id="aiAnalysis" style="display:none;">
        <h3 style="color:var(--gold); margin-top:0;">AI 命理師評測：</h3>
        <div id="aiContent">正在感應卦象中...</div>
    </div>
</div>

<script>
    let tossCount = 0;
    let hexagram = [];
    const questionInput = document.getElementById('question');

    async function tossCoins() {
        if (!questionInput.value) {
            alert("請先輸入您的問題，心誠則靈。");
            return;
        }
        if (tossCount >= 6) return;

        tossCount++;
        let coins = [Math.random() > 0.5 ? 1 : 0, Math.random() > 0.5 ? 1 : 0, Math.random() > 0.5 ? 1 : 0];
        let sum = coins.reduce((a, b) => a + b, 0);
        
        // 3正為老陽(3), 0正為老陰(0), 2正為少陰(2), 1正為少陽(1)
        let resultText = (sum === 3) ? "老陽 (X)" : (sum === 0) ? "老陰 (O)" : (sum === 2) ? "少陰" : "少陽";
        let yinYang = (sum === 3 || sum === 1) ? "陽" : "陰";
        
        hexagram.push({sum, resultText});

        // 顯示動畫與結果
        document.getElementById('coinResult').innerText = coins.map(c => c ? "🟡" : "⚪").join(" ");
        document.getElementById('status').innerText = `剩餘次數：${6 - tossCount}`;

        let row = `<tr><td>第 ${tossCount} 爻</td><td>${resultText}</td><td>${yinYang}</td></tr>`;
        document.getElementById('historyBody').innerHTML = row + document.getElementById('historyBody').innerHTML;

        if (tossCount === 6) {
            analyzeGua();
        }
    }

    async function analyzeGua() {
        document.getElementById('aiAnalysis').style.display = 'block';
        const aiContent = document.getElementById('aiContent');
        
        // 這裡封裝了你的精準指令
        const prompt = `
        你是一位精通易經六爻的命理大師。現在有一位求問者，問題是：『${questionInput.value}』。
        卦象結果（由初爻到上爻）：${hexagram.map(h => h.resultText).join(", ")}。

        請嚴格按照以下格式進行精準評測：
        
        1. 【斷語】：如果問題是問「會不會、能不能、好不好」，請直接給出傾向性結論（例如：大吉、偏向成功、機率不大），並給出一個 0-100% 的成事機率。
        
        2. 【情境貼合分析】：
           - 若問感情：分析對方的心理狀態或兩人的緣分深淺。
           - 若問事業/金錢：分析障礙點在哪裡，財運是否亨通。
           - 若問是非：分析是否有小人或流言。
        
        3. 【卦象解碼】：簡單解釋為什麼會有上述結論（結合動爻、陰陽變化）。
        
        4. 【大師叮嚀】：給予具體的行動建議。
        
        請用專業、沉穩、帶有一點玄學優雅感的語氣回答，字數約 200-300 字。
        `;

        try {
            // 使用免費的 DuckDuckGo 或類似 API 的橋接方式，這裡簡化為邏輯演示
            // 實務上您可以在此串接您的 API Key
            aiContent.innerText = "正在為您撥雲見日，請稍候...";
            
            // 這裡模擬 AI 回覆，正式版建議您放入您的 OpenAI/Gemini API Key 串接代碼
            // 為了讓您馬上能用，我先寫一個自動化邏輯
            setTimeout(() => {
                aiContent.innerText = "【斷語】卦象顯示此時「誠則靈，躁則凶」。成事機率約 65%。\n\n【情境分析】針對您問的「" + questionInput.value + "」，卦中陽氣漸長，代表事情已有眉目。若是問感情，代表對方對您有期待但仍有顧慮；若是問事業，則需注意中途轉向。\n\n【卦象解碼】您的卦象中出現了變爻，代表事情正處於轉換期，不宜墨守成規。\n\n【大師叮嚀】保持冷靜，三日之內必有轉機，建議多聽取長輩意見。";
            }, 2000);

        } catch (e) {
            aiContent.innerText = "感應失敗，請檢查網路連線。";
        }
    }
</script>

</body>
</html>
