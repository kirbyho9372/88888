<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玄機 · 六爻占卜</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700;900&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #d4af37;
    --gold-light: #f0d060;
    --gold-dim: #8a6f1e;
    --dark: #0a0806;
    --dark-card: #110e08;
    --dark-panel: #1a1408;
    --dark-border: #2e2310;
    --red-yang: #ff6b4a;
    --blue-yin: #4aa8ff;
    --purple-change: #c77dff;
    --text-muted: #6b5a3a;
    --text-body: #c8b078;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Noto Serif TC", serif;
    background: var(--dark);
    color: var(--text-body);
    min-height: 100vh;
    background-image: radial-gradient(ellipse at 20% 10%, rgba(212,175,55,0.04) 0%, transparent 50%), url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4af37' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  .wrapper { max-width: 680px; margin: 0 auto; padding: 40px 20px; }
  .header { text-align: center; padding: 40px 0; }
  .header h1 { font-size: 42px; color: var(--gold); letter-spacing: 8px; text-shadow: 0 0 20px rgba(212,175,55,0.3); }

  .card {
    background: var(--dark-card);
    border: 1px solid var(--dark-border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
  }

  .card-title { font-size: 11px; letter-spacing: 4px; color: var(--gold-dim); text-transform: uppercase; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
  .card-title::after { content: ''; flex: 1; height: 1px; background: var(--dark-border); }

  .question-input {
    width: 100%; background: var(--dark-panel); border: 1px solid var(--dark-border); border-radius: 10px;
    padding: 16px 20px; color: var(--text-body); outline: none; min-height: 80px; font-family: inherit; font-size: 15px;
  }

  .coins-area { display: flex; justify-content: center; gap: 24px; margin: 20px 0; }
  .coin {
    width: 72px; height: 72px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #f0d060, #b8962d 60%, #7a5e10);
    border: 2px solid var(--gold-dim); display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: var(--dark); font-weight: 900;
  }

  .toss-btn {
    width: 100%; background: var(--gold-dim); border: none; border-radius: 10px; padding: 16px;
    font-size: 16px; font-weight: 700; letter-spacing: 4px; color: var(--dark); cursor: pointer; transition: 0.3s;
  }
  .toss-btn:hover { background: var(--gold-light); }

  .hexagram-visual { display: flex; flex-direction: column-reverse; gap: 10px; padding: 20px; background: var(--dark-panel); border-radius: 12px; margin: 16px 0; }
  .hex-line { display: flex; align-items: center; gap: 12px; }
  .hex-bars { flex: 1; display: flex; gap: 6px; height: 10px; }
  .hex-bar { flex: 1; border-radius: 3px; }
  .c-yang { background: var(--red-yang); }
  .c-yin { background: var(--blue-yin); }
  .c-old { background: var(--purple-change); }

  .ai-btn { width: 100%; background: transparent; border: 1px solid var(--gold-dim); border-radius: 10px; padding: 16px; color: var(--gold); cursor: pointer; letter-spacing: 4px; transition: 0.3s; }
  .ai-btn:hover:not(:disabled) { border-color: var(--gold); background: rgba(212,175,55,0.05); }

  .ai-output { background: var(--dark-panel); border: 1px solid var(--dark-border); border-radius: 12px; padding: 24px; margin-top: 16px; display: none; line-height: 2; }
  .ai-section { margin-bottom: 20px; }
  .ai-section-title { font-size: 13px; color: var(--gold); border-bottom: 1px solid var(--dark-border); margin-bottom: 10px; padding-bottom: 5px; letter-spacing: 2px; }
  .ai-text { font-size: 14px; color: #a89060; }
</style>
</head>
<body>

<div class="wrapper">
  <div class="header"><h1>玄 機</h1></div>

  <div class="card">
    <div class="card-title">☯ 心中所求</div>
    <textarea class="question-input" id="questionInput" placeholder="請在此輸入您想請示的事情..."></textarea>
  </div>

  <div class="card">
    <div class="coins-area">
        <div class="coin" id="c1">？</div><div class="coin" id="c2">？</div><div class="coin" id="c3">？</div>
    </div>
    <button class="toss-btn" id="tossBtn" onclick="toss()">✦ 擲錢起卦</button>
    <div id="status" style="text-align:center; margin-top:10px; font-size:12px; color:var(--text-muted);"></div>
  </div>

  <div class="card" id="hexCard" style="display:none;">
    <div class="card-title">☰ 卦象呈現</div>
    <div class="hexagram-visual" id="hexVisual"></div>
    <button class="ai-btn" id="aiBtn" onclick="summon()">✦ 召喚玄機深度解析</button>
  </div>

  <div class="ai-output" id="aiOutput"></div>
</div>

<script>
let lines = [];

function toss() {
  if(lines.length >= 6) return;
  const q = document.getElementById('questionInput').value.trim();
  if(!q) { alert("請先寫下您的問題。"); return; }

  let heads = 0;
  for(let i=0; i<3; i++) if(Math.random() > 0.5) heads++;
  
  // 記錄爻象
  let type = heads===3?'old-yang':(heads===2?'yang':(heads===1?'yin':'old-yin'));
  lines.push(type);
  
  // 顯示硬幣結果
  document.getElementById('c1').innerText = Math.random() > 0.5 ? '正' : '反';
  document.getElementById('c2').innerText = Math.random() > 0.5 ? '正' : '反';
  document.getElementById('c3').innerText = Math.random() > 0.5 ? '正' : '反';
  
  document.getElementById('status').innerText = `已完成第 ${lines.length} 爻能量感應`;
  render();
  
  if(lines.length === 6) {
      document.getElementById('hexCard').style.display = 'block';
      document.getElementById('tossBtn').disabled = true;
      document.getElementById('tossBtn').innerText = '✦ 六爻已成';
  }
}

function render() {
  const v = document.getElementById('hexVisual'); v.innerHTML = '';
  lines.forEach(l => {
    const row = document.createElement('div'); row.className = 'hex-line';
    const bars = document.createElement('div'); bars.className = 'hex-bars';
    const isYang = l.includes('yang');
    const isOld = l.includes('old');
    const colorClass = isOld ? 'c-old' : (isYang ? 'c-yang' : 'c-yin');
    
    if(isYang) {
        bars.innerHTML = `<div class="hex-bar ${colorClass}"></div>`;
    } else {
        bars.innerHTML = `<div class="hex-bar ${colorClass}" style="flex:0.46"></div><div style="flex:0.08"></div><div class="hex-bar ${colorClass}" style="flex:0.46"></div>`;
    }
    row.appendChild(bars); v.appendChild(row);
  });
}

function summon() {
  const q = document.getElementById('questionInput').value;
  const out = document.getElementById('aiOutput');
  out.style.display = 'block';
  out.innerHTML = "<div style='text-align:center; color:var(--gold-dim);'>正在撥雲見日，感應卦象中...</div>";
  
  setTimeout(() => {
    // 核心邏輯：計算陽爻與動爻
    const yangCount = lines.filter(l => l.includes('yang')).length;
    const changeCount = lines.filter(l => l.includes('old')).length;
    const prob = Math.floor((yangCount * 14) + (Math.random() * 12) + 5);
    
    // 分流情境判斷
    let type = "通用";
    if(/情|愛|他|她/.test(q)) type = "感情";
    if(/錢|工作|事業|職/.test(q)) type = "事業";

    let scenario = "";
    if(type === "感情") {
        scenario = "關於這段緣分，目前處於「陰陽交替」的階段。對方的態度可能還在觀望，建議給彼此一點空間，不要逼得太緊。";
    } else if(type === "事業") {
        scenario = "事業方面，目前適合「守成」而非「進攻」。卦象顯示雖然有機會，但外在環境還不夠穩定，再觀察兩週會更明朗。";
    } else {
        scenario = "您求問的事，目前天時已有，地利尚缺。事情會朝向正確的方向發展，但速度會比您預想的慢一些。";
  }

    // 重新編排結構，移除所有會導致亂碼的 HTML 標籤
    const sections = [
        { t: "✦ 長者斷語", c: `此事目前局勢平穩，仍需耐心等待。成事機率約 ${prob > 98 ? 98 : prob}%。` },
        { t: "✦ 情境感應", c: scenario },
        { t: "✦ 易理分析", c: `卦中陽氣佔 ${yangCount} 分，變爻出現 ${changeCount} 處。這代表「變數」依然存在，保持平常心是化解變數最好的方法。` },
        { t: "✦ 長者叮嚀", c: "心誠則靈。這幾天請多讓自己休息，好的決定往往在心安靜時才會出現。" }
    ];
    
    out.innerHTML = sections.map(s => `
        <div class="ai-section">
            <div class="ai-section-title">${s.t}</div>
            <div class="ai-text">${s.c}</div>
        </div>
    `).join('');
    out.scrollIntoView({behavior:'smooth', block:'start'});
  }, 1200);
}
</script>

</body>
</html>
