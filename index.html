<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玄機 · 六爻感應占卜</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700;900&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #d4af37;
    --gold-light: #f0d060;
    --gold-dim: #8a6f1e;
    --dark: #0a0806;
    --dark-card: #110e08;
    --dark-panel: #1a1408;
    --dark-border: #2e2310;
    --red-yang: #ff6b4a;
    --blue-yin: #4aa8ff;
    --green-change: #33cc99; /* 按照圖片修改變爻顏色為綠色 */
    --text-muted: #6b5a3a;
    --text-body: #c8b078;
    /* 爻的光暈效果 */
    --glow-gold: 0 0 10px rgba(212,175,55,0.6);
    --glow-green: 0 0 10px rgba(51,204,153,0.6);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Noto Serif TC", serif;
    background: var(--dark);
    color: var(--text-body);
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(212,175,55,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(212,175,55,0.03) 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4af37' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  /* ── LAYOUT ── */
  .wrapper {
    position: relative; z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    padding: 40px 0 30px;
  }
  .header h1 {
    font-size: 42px;
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 40px rgba(212,175,55,0.5);
    letter-spacing: 8px;
  }
  .header-sub {
    margin-top: 10px;
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--text-muted);
  }

  /* ── CARD ── */
  .card {
    background: var(--dark-card);
    border: 1px solid var(--dark-border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .card-title {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--dark-border);
  }

  /* ── QUESTION INPUT ── */
  .question-input {
    width: 100%;
    background: var(--dark-panel);
    border: 1px solid var(--dark-border);
    border-radius: 10px;
    padding: 16px 20px;
    color: var(--text-body);
    resize: none;
    outline: none;
    min-height: 80px;
    font-family: inherit;
  }

  /* ── COINS ── */
  .coins-area {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin: 25px 0;
  }
  .coin {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #f0d060, #b8962d 60%, #7a5e10);
    border: 2px solid var(--gold-dim);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    font-weight: 900;
    color: var(--dark);
  }

  /* ── TOSS BUTTON ── */
  .toss-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--gold-dim), var(--gold), var(--gold-dim));
    border: none;
    border-radius: 10px;
    padding: 16px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--dark);
    cursor: pointer;
    transition: all 0.3s;
  }
  .toss-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(212,175,55,0.3);
  }
  .toss-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── 【重點優化：卦象呈同樣式】 ── */
  .hex-area {
    display: grid;
    grid-template-columns: 80px 1fr; /* 仿圖片排版 */
    gap: 20px;
    margin-top: 15px;
  }

  /* 左側爻的霓虹顯示 */
  .hex-display {
    display: flex;
    flex-direction: column-reverse; /* 初爻在下 */
    gap: 8px; /* 圖片中的爻比較擠 */
    align-items: center;
    justify-content: center;
  }
  .hex-line-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.5s ease;
  }
  .hex-line-wrap.appear {
    opacity: 1;
    transform: translateY(0);
  }
  .hex-number {
    font-size: 12px;
    color: #666; /* 仿圖片數字顏色 */
    width: 10px;
  }

  /* 模擬圖片中爻的質感：圓角、厚度、霓虹光暈 */
  .hex-bars-inner {
    width: 60px; /* 霓虹管寬度 */
    height: 6px; /* 霓虹管厚度 */
    border-radius: 3px; /* 圓角 */
    position: relative;
  }
  /* 少陽少陰（靜爻）：金色霓虹 */
  .hex-bar-static {
    background: var(--gold-light);
    box-shadow: var(--glow-gold);
  }
  /* 老陽老陰（動爻）：綠色霓虹 (按照圖片) */
  .hex-bar-dynamic {
    background: var(--green-change);
    box-shadow: var(--glow-green);
  }

  /* 陰爻中斷 */
  .hex-bar-yin-wrap {
    display: flex;
    gap: 4px;
  }

  /* 右側信息排版 (仿圖片) */
  .hex-info {
    border-left: 1px solid var(--dark-border);
    padding-left: 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .gua-name {
    font-size: 20px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 4px;
    margin-bottom: 8px;
  }
  .gua-desc {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  /* 專業 Tags (仿圖片) */
  .tags {
    display: flex;
    gap: 8px;
    margin-bottom: 15px;
  }
  .tag {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 3px;
    border: 1px solid rgba(212,175,55,0.3);
  }
  .tag-yin { background: rgba(74,168,255,0.1); color: var(--blue-yin); }
  .tag-move { background: rgba(255,107,74,0.1); color: #ff6666; }
  .tag-earth { background: rgba(168,144,96,0.1); color: #a89060; }

  .oracle-quote {
    font-size: 14px;
    font-style: italic;
    color: var(--text-muted);
    line-height: 1.6;
    border-left: 2px solid var(--dark-border);
    padding-left: 10px;
  }

  /* AI 深度解析 */
  .ai-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--gold-dim);
    border-radius: 10px;
    padding: 16px;
    color: var(--gold);
    cursor: pointer;
    letter-spacing: 4px;
    margin-top: 10px;
  }
  .ai-output {
    background: var(--dark-panel);
    border: 1px solid var(--dark-border);
    border-radius: 12px;
    padding: 24px;
    margin-top: 16px;
    display: none;
    line-height: 2;
  }
  .ai-section { margin-bottom: 20px; }
  .ai-section-title { font-size: 13px; color: var(--gold); border-bottom: 1px solid var(--dark-border); margin-bottom: 10px; padding-bottom: 5px; }
</style>
</head>
<body>

<div class="wrapper">
  <div class="header"><h1>玄 機</h1><div class="header-sub">六爻占卜 · 感應系统</div></div>

  <div class="card">
    <div class="card-title">☯ 心中所求</div>
    <textarea class="question-input" id="questionInput" placeholder="輸入求問之事，越具體越好..."></textarea>
  </div>

  <div class="card">
    <div class="card-title">⚙ 起卦儀式</div>
    <div class="coins-area">
        <div class="coin" id="c1">？</div><div class="coin" id="c2">？</div><div class="coin" id="c3">？</div>
    </div>
    <button class="toss-btn" id="tossBtn" onclick="toss()">✦ 擲錢起卦</button>
    <div id="status" style="text-align:center; margin-top:10px; font-size:12px; color:var(--text-muted);"></div>
  </div>

  <div class="card" id="hexCard" style="display:none;">
    <div class="card-title">☰ 卦象呈現</div>
    
    <div class="hex-area">
        <div class="hex-display" id="hexVisual"></div>
        
        <div class="hex-info">
            <div class="gua-name">感應卦象</div>
            <div class="gua-desc">六爻圓滿 · 能量感應</div>
            
            <div class="tags" id="guaTags">
                </div>
            
            <div class="oracle-quote">
                易與天地準，故能彌綸天地之道。<br>
                《周易·繫辭上》
            </div>
        </div>
    </div>
    
    <button class="ai-btn" id="aiBtn" onclick="summon()">✦ 召喚玄機深度解析</button>
  </div>

  <div class="ai-output" id="aiOutput"></div>
</div>

<script>
let lines = [];
const coinHeads = '正', coinTails = '反';

function toss() {
  if(lines.length >= 6) return;
  const q = document.getElementById('questionInput').value.trim();
  if(!q) { alert("請先寫下您的問題，心誠則靈。"); return; }

  let headsCount = 0;
  const c1Text = Math.random() > 0.5 ? coinHeads : coinTails;
  const c2Text = Math.random() > 0.5 ? coinHeads : coinTails;
  const c3Text = Math.random() > 0.5 ? coinHeads : coinTails;
  if(c1Text === coinHeads) headsCount++;
  if(c2Text === coinHeads) headsCount++;
  if(c3Text === coinHeads) headsCount++;
  
  // 3正為老陽(變)，0正為老陰(變)，2正為少陰，1正為少陽
  let type = headsCount===3?'old-yang':(headsCount===2?'yin':(headsCount===1?'yang':'old-yin'));
  lines.push(type);
  
  document.getElementById('c1').innerText = c1Text;
  document.getElementById('c2').innerText = c2Text;
  document.getElementById('c3').innerText = c3Text;
  document.getElementById('status').innerText = `剩餘感應次數：${6 - lines.length}`;
  render();
  
  if(lines.length === 6) {
      document.getElementById('hexCard').style.display = 'block';
      document.getElementById('tossBtn').disabled = true;
      document.getElementById('tossBtn').innerText = '✦ 感應圓滿';
  }
}

// ── 【專業視覺升級：爻的渲染邏輯】 ──
function render() {
  const v = document.getElementById('hexVisual'); v.innerHTML = '';
  const tagArea = document.getElementById('guaTags');
  
  lines.forEach((l, i) => {
    const wrap = document.createElement('div'); row.className = 'hex-line-wrap';
    const num = document.createElement('div'); num.className = 'hex-number'; num.innerText = i + 1; // 第幾爻的數字
    const barsInner = document.createElement('div'); 
    
    const isYang = l.includes('yang');
    const isChange = l.includes('old'); // 老陽或老陰即為變爻

    // 基礎屬性：少陽/少陰金色霓虹，老陽/老陰綠色霓虹
    const barClass = isChange ? 'hex-bar-dynamic' : 'hex-bar-static';
    
    if(isYang) {
        // 陽爻：整條不中斷
        barsInner.className = `hex-bars-inner ${barClass}`;
    } else {
        // 陰爻：中斷
        barsInner.className = `hex-bars-inner hex-bar-yin-wrap`;
        barsInner.innerHTML = `<div class="${barClass}" style="flex:1; height:6px; border-radius:3px;"></div><div class="${barClass}" style="flex:1; height:6px; border-radius:3px;"></div>`;
    }
    
    wrap.appendChild(barsInner);
    wrap.appendChild(num); // 數字放在爻的右側（仿圖片）
    v.appendChild(wrap);
    setTimeout(() => wrap.classList.add('appear'), 50);
  });

  // 更新 Tags (仿圖片)
  if(lines.length === 6) {
    const changeCount = lines.filter(l => l.includes('old')).length;
    tagArea.innerHTML = `
        <div class="tag ${lines.filter(l => !l.includes('yang')).length >= 4 ? 'tag-yin' : ''}">陰卦</div>
        <div class="tag ${changeCount > 0 ? 'tag-move' : ''}">有變爻 ${changeCount} 條</div>
        <div class="tag tag-earth">土行</div>
    `;
  }
}

function summon() {
  const q = document.getElementById('questionInput').value;
  const out = document.getElementById('aiOutput');
  out.style.display = 'block';
  out.innerHTML = "<div style='text-align:center; color:var(--gold-dim);'>正在依據爻象與五行進行精細感應...</div>";
  
  setTimeout(() => {
    // 核心邏輯：吉凶基於陽爻數量與隨機性
    const yangCount = lines.filter(l => l.includes('yang')).length;
    const prob = Math.floor((yangCount * 14) + (Math.random() * 12) + 5);
    const finalProb = prob > 98 ? 98 : (prob < 8 ? 8 : prob);

    let scenario = "此卦顯示當前局勢定而不變，您的目標看似有阻礙，但實則是考驗。此時「靜觀其變」是上策。";
    if(/情|愛/.test(q)) {
        scenario = "感情方面，若問感覺，對方對您是有所保留的。目前的陽氣漸長，雖然您主動但切忌急躁，這場感應需要時間來沉澱。";
    } else if(/錢|工作|事業/.test(q)) {
        scenario = "事業上，此刻適合「蓄勢待發」。外在阻力較大，就像厚重的泥土壓在種子上，雖然難受但正是積累實力的最好時機。";
    }

    const sections = [
        { t: "✦ 吉凶概覽", c: `成事機率約 ${finalProb}%。當前狀態如「守恆」，宜靜不宜動。` },
        { t: "✦ 情境感應", c: `針對您的問題，長者感應到以下信息：<br>${scenario}` },
        { t: "✦ 易理叮嚀", c: "心誠則靈。這兩天可以多看一些智慧類的文章，好的決定往往在心安靜時才會出現。" }
    ];
    
    out.innerHTML = sections.map(s => `
        <div class="ai-section">
            <div class="ai-section-title">${s.t}</div>
            <div style="font-size:15px; color:#a89060;">${s.c}</div>
        </div>
    `).join('');
    out.scrollIntoView({behavior:'smooth'});
  }, 1200);
}
</script>

</body>
</html>
