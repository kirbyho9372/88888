<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄機 · 六爻感應占卜</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #0a0b06; --panel: #1a1a0b; --text: #f0e68c; }
        body { background-color: var(--dark); color: var(--text); font-family: 'Noto Serif TC', serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { max-width: 500px; width: 100%; background: var(--panel); padding: 25px; border: 1px solid var(--gold); border-radius: 12px; box-shadow: 0 0 25px rgba(212,175,55,0.3); }
        h1 { color: var(--gold); text-align: center; font-size: 26px; margin-bottom: 20px; letter-spacing: 4px; border-bottom: 1px solid var(--gold); padding-bottom: 10px; }
        input, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--gold); box-sizing: border-box; font-size: 16px; }
        input { background: #1a1a0a; color: white; border: 1px solid #555; }
        button { background: var(--gold); color: var(--dark); font-weight: bold; cursor: pointer; transition: 0.4s; text-transform: uppercase; }
        button:hover { background: #f0e68c; box-shadow: 0 0 10px var(--gold); }
        .coin-area { display: flex; justify-content: center; gap: 15px; margin: 25px 0; font-size: 50px; min-height: 70px; }
        .status-bar { text-align: center; font-size: 14px; color: var(--gold); margin-bottom: 10px; opacity: 0.8; }
        .result-box { margin-top: 30px; padding: 20px; background: #222212; border: 1px solid var(--gold); border-radius: 10px; display: none; line-height: 1.8; }
        .history-list { width: 100%; margin-top: 20px; border-collapse: collapse; background: #000; border-radius: 8px; overflow: hidden; }
        .history-list th { background: #333; color: var(--gold); padding: 10px; }
        .history-list td { border: 1px solid #222; padding: 12px; text-align: center; font-size: 14px; }
        .highlight { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>玄機 · 誠心占卜</h1>
    <input type="text" id="userQuestion" placeholder="請輸入您心中所求之事（例如：這段感情的走向？）">
    
    <div class="coin-area" id="visualCoins">🪙 🪙 🪙</div>
    <div class="status-bar" id="tossStatus">心誠則靈，請擲杯六次</div>
    
    <button id="actionBtn" onclick="handleToss()">開始擲杯</button>
    
    <table class="history-list">
        <thead><tr><th>爻序</th><th>卦象結果</th><th>陰陽</th></tr></thead>
        <tbody id="logBody"></tbody>
    </table>

    <div class="result-box" id="analysisResult">
        <h3 style="color:var(--gold); margin-top:0; border-bottom:1px solid #444;">長者解卦筆記：</h3>
        <div id="finalText"></div>
    </div>
</div>

<script>
    let currentToss = 0;
    let guaData = [];

    function handleToss() {
        const q = document.getElementById('userQuestion').value;
        if(!q) { alert("請先寫下您的問題。"); return; }
        if(currentToss >= 6) return;

        currentToss++;
        let c = [Math.random()>0.5?1:0, Math.random()>0.5?1:0, Math.random()>0.5?1:0];
        let sum = c.reduce((a,b)=>a+b, 0);
        
        let name = (sum===3)?"老陽(變)":(sum===0)?"老陰(變)":(sum===2)?"少陰":"少陽";
        let type = (sum===3||sum===1)?"陽":"陰";
        
        guaData.push({sum, name, type});

        document.getElementById('visualCoins').innerText = c.map(i=>i?"🟡":"⚪").join(" ");
        document.getElementById('tossStatus').innerText = `已完成：${currentToss} / 6`;

        let row = `<tr><td>第 ${currentToss} 爻</td><td>${name}</td><td class="highlight">${type}</td></tr>`;
        document.getElementById('logBody').innerHTML = row + document.getElementById('logBody').innerHTML;

        if(currentToss === 6) {
            document.getElementById('actionBtn').disabled = true;
            generateSmartAnalysis(q);
        }
    }

    function generateSmartAnalysis(q) {
        const resBox = document.getElementById('analysisResult');
        const resText = document.getElementById('finalText');
        resBox.style.display = 'block';
        
        // 核心邏輯計算
        let yangCount = guaData.filter(g => g.type === "陽").length;
        let changeCount = guaData.filter(g => g.sum === 0 || g.sum === 3).length;
        let score = (yangCount * 15) + (Math.random() * 10);
        if(score > 100) score = 98;
        
        // 判斷問題類型
        let type = "通用";
        if(q.includes("情") || q.includes("愛") || q.includes("他") || q.includes("她")) type = "感情";
        if(q.includes("錢") || q.includes("工作") || q.includes("事") || q.includes("生")) type = "事業";

        let conclusion = score > 60 ? "【斷語】此卦象顯示：吉。成事機率約 " + Math.floor(score) + "%。" : "【斷語】目前時機尚未成熟。成事機率約 " + Math.floor(score) + "%。";
        
        let scenario = "";
        if(type === "感情") {
            scenario = "針對您問的感情之事，長者感應到對方的心境正如同這卦象，有起伏但仍有餘地。若問感覺，對方目前對您是有所保留的「觀望」狀態，建議不要急於索求答案。";
        } else if(type === "事業") {
            scenario = "事業方面，目前處於「蓄勢待發」的階段。卦中的變爻代表事情會有一次轉折，現在看到的困難不一定是壞事，反而是轉機。";
        } else {
            scenario = "關於您求問的事，目前局勢如雲開見月。事情的發展會比您預想的要慢一些，但方向是正確的。";
        }

        let advice = changeCount > 2 ? "卦中動爻較多，代表「變數大」，這幾天請保持平常心，以靜制動。" : "卦象平穩，代表「守恆」，只要按部就班，事情自然水到渠成。";

        resText.innerHTML = `<p>${conclusion}</p><p>【情境感應】<br>${scenario}</p><p>【易理分析】<br>此卦陽氣佔 ${yangCount} 分，陰氣佔 ${6-yangCount} 分，陰陽調和程度尚可。${advice}</p><p>【長者叮嚀】<br>莫急、莫慌。這兩天可以多喝茶靜心，好的答案往往在放鬆時出現。</p>`;
    }
</script>

</body>
</html>
